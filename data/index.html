<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Church</title>

<!-- ✅ Chart.js corrigé -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#f4f4f4; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
canvas { max-width:600px; margin:auto; }
</style>
</head>

<body>

<h2>⛪ Smart Church Dashboard JEAN JACSON JACQUES</h2>

<div class="card">🌡 Température: <span id="temp">--</span></div>
<div class="card">💧 Humidité: <span id="hum">--</span></div>
<div class="card">🚶 Mouvement: <span id="motion">--</span></div>
<div class="card">💡 Lumière: <span id="light">--</span></div>

<canvas id="tempChart"></canvas>
<canvas id="humChart"></canvas>

<script>

// 🔥 DEBUG
console.log("JS chargé");

// ===== GRAPH =====
let labels = [];
let tempData = [];
let humData = [];

const tempChart = new Chart(document.getElementById("tempChart"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Température",
      data: tempData
    }]
  }
});

const humChart = new Chart(document.getElementById("humChart"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Humidité",
      data: humData
    }]
  }
});

// ===== XHR CORRIGÉ =====
function getData(endpoint, callback){
  let xhr = new XMLHttpRequest();

  // 🔥 FIX IMPORTANT
  let url = window.location.origin + endpoint;

  xhr.open("GET", url, true);

  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4){
      if(xhr.status === 200){
        let data = JSON.parse(xhr.responseText);
        console.log(endpoint, data); // debug
        callback(data);
      } else {
        console.log("Erreur:", endpoint);
      }
    }
  };

  xhr.send();
}

// ===== LOGIQUE =====
function evalTemp(t){ return t>30?"🔥 Chaud":t<18?"❄️ Froid":"✅ OK"; }
function evalHum(h){ return h>70?"💧 Elevée":h<30?"🌵 Faible":"✅ OK"; }
function evalMotion(m){ return m?"🚶 Détecté":"⛔ Aucun"; }
function evalLight(l){ return l<200?"🌙 Faible":"💡 Bonne"; }

// ===== UPDATE =====
function update(){

  getData("/temperature", d=>{
    document.getElementById("temp").innerHTML =
      d.value + " °C - " + evalTemp(d.value);
    tempData.push(d.value);
  });

  getData("/humidity", d=>{
    document.getElementById("hum").innerHTML =
      d.value + " % - " + evalHum(d.value);
    humData.push(d.value);
  });

  getData("/motion", d=>{
    document.getElementById("motion").innerHTML =
      evalMotion(d.value);
  });

  getData("/light", d=>{
    document.getElementById("light").innerHTML =
      d.value + " lx - " + evalLight(d.value);
  });

  let time = new Date().toLocaleTimeString();
  labels.push(time);

  if(labels.length > 10){
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  tempChart.update();
  humChart.update();
}

// ===== START =====
setInterval(update, 2000);
update();

</script>

</body>
</html>
